<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegance Perfumes | Alta Perfumaria Turbinada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Montserrat"', 'sans-serif'],
                    },
                    colors: { 
                        gold: { DEFAULT: '#D4AF37', light: '#F9F1D8' },
                        midnight: '#0A0A0A'
                    } 
                }
            }
        }
    </script>
    <style>
        /* Efeito de rolagem suave */
        html { scroll-behavior: smooth; }
        /* Barra de rolagem elegante */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }
        
        /* Ajuste para imagens de produto ficarem contidas */
        .product-image {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            padding: 1rem; 
        }
    </style>
</head>
<body class="bg-[#FAFAFA] text-gray-800 font-sans antialiased selection:bg-gold selection:text-white">

    <header class="bg-white/90 backdrop-blur-sm text-midnight sticky top-0 z-50 border-b border-gray-100 shadow-sm">
        <div class="container mx-auto px-4 md:px-6 py-3 flex flex-col md:flex-row gap-4 justify-between items-center">
            <h1 class="text-3xl font-serif font-bold tracking-widest uppercase text-midnight">
                Elegance
            </h1>
            
            <div class="relative w-full md:w-96">
                <input type="text" id="search-input" onkeyup="window.searchProducts()" placeholder="Buscar perfume por nome ou marca..." class="w-full bg-gray-50 border border-gray-200 rounded-full py-2 pl-5 pr-12 text-sm focus:border-gold focus:ring-1 focus:ring-gold outline-none transition">
                <button class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gold">
                    <i class="fas fa-search"></i>
                </button>
            </div>

            <button onclick="window.toggleCart()" class="relative p-2 group transition duration-300">
                <i class="fas fa-shopping-bag text-2xl group-hover:text-gold transition-colors"></i>
                <span id="cart-count" class="absolute top-0 right-0 bg-gold text-white text-[10px] font-bold rounded-full h-5 w-5 flex items-center justify-center shadow-md">0</span>
            </button>
        </div>
    </header>

    <section id="hero-section" class="relative bg-midnight text-white py-24 flex items-center justify-center overflow-hidden transition-all duration-500">
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-20"></div>
        <div class="relative z-10 text-center px-4 max-w-3xl">
            <span class="text-gold uppercase tracking-[0.3em] text-sm font-semibold mb-3 block">A Arte da Perfumaria</span>
            <h2 class="text-4xl md:text-6xl font-serif mb-5 leading-tight">Desperte sua <br/><span class="italic text-gold">essência única</span></h2>
            <a href="#catalogo" class="inline-block border border-gold text-gold hover:bg-gold hover:text-midnight px-8 py-3 uppercase tracking-widest text-xs transition-all duration-500 rounded-sm">Explorar Coleção</a>
        </div>
    </section>

    <main id="catalogo" class="container mx-auto px-4 md:px-6 py-16">
        
        <div id="search-count" class="hidden text-center text-sm text-gray-500 mb-8 font-medium italic"></div>

        <div id="no-results" class="hidden text-center py-20 text-gray-500 flex flex-col items-center gap-4">
            <i class="fas fa-search text-5xl opacity-30">Elegance</i>
            <p class="text-xl font-light">Nenhum perfume corresponde à sua busca.</p>
            <button onclick="window.clearSearch()" class="text-gold hover:underline">Limpar busca</button>
        </div>

        <div id="section-Árabes" class="mb-20 product-section">
            <div class="text-center mb-10">
                <h3 class="text-4xl font-serif text-midnight mb-2">Árabes</h3>
                <div class="w-16 h-px bg-gold mx-auto"></div>
            </div>
            <div id="grid-Árabes" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
                </div>
        </div>

        <div id="section-brand" class="mb-10 product-section">
            <div class="text-center mb-10">
                <h3 class="text-4xl font-serif text-midnight mb-2">Brand <span class="text-xl font-light italic text-gray-500">(Linha Coleção)</span></h3>
                <div class="w-16 h-px bg-gold mx-auto"></div>
            </div>
            <div id="grid-brand" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
                </div>
        </div>
    </main>

    <footer class="bg-midnight text-white py-12 border-t-4 border-gold">
        <div class="container mx-auto px-6 text-center">
            <h2 class="text-2xl font-serif tracking-widest mb-4">ELEGANCE</h2>
            <p class="text-sm text-gray-400 font-light">Atendimento exclusivo via WhatsApp.</p>
            <p class="text-sm text-gray-400 font-light mt-2">&copy; 2024 Elegance Perfumes. Todos os direitos reservados.</p>
        </div>
    </footer>

    <div id="cart-overlay" onclick="window.toggleCart()" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity duration-300"></div>
    
    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full md:w-96 bg-white shadow-2xl transform translate-x-full transition-transform duration-500 z-50 flex flex-col">
        <div class="px-6 py-5 bg-white border-b flex justify-between items-center">
            <h2 class="text-2xl font-serif text-midnight">Sua Sacola</h2>
            <button onclick="window.toggleCart()" class="text-gray-400 hover:text-gold transition-colors duration-300 text-xl"><i class="fas fa-times"></i></button>
        </div>
        
        <div id="cart-items" class="p-6 flex-1 overflow-y-auto flex flex-col gap-6">
            </div>
        
        <div class="p-6 bg-gray-50 border-t border-gray-100">
            <div class="flex justify-between font-serif text-xl text-midnight mb-6">
                <span>Total</span>
                <span id="cart-total">R$ 0,00</span>
            </div>
            <button onclick="window.checkout()" class="w-full bg-midnight text-white uppercase tracking-widest text-sm py-4 rounded-sm hover:bg-gold transition-colors duration-500 shadow-lg">
                Finalizar no WhatsApp
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBBzLjq-FsBI7nK97MvF_-FMNEDDakbs3o",
            authDomain: "elegance-perfum.firebaseapp.com",
            projectId: "elegance-perfum",
            storageBucket: "elegance-perfum.firebasestorage.app",
            messagingSenderId: "12599337514",
            appId: "1:12599337514:web:b83c321202fc48ba73d953"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let products = [];
        let cart = [];

        onSnapshot(collection(db, "produtos"), (snapshot) => {
            products = [];
            snapshot.forEach((doc) => {
                products.push({ id: doc.id, ...doc.data() }); 
            });
            
            window.renderProducts(products);
            
            cart = cart.filter(cartItem => products.some(p => p.id === cartItem.id));
            window.updateCart(); 
        });

        window.renderProducts = function(productsToRender = products) {
            const gridBot = document.getElementById('grid-Árabes');
            const gridBrand = document.getElementById('grid-brand');
            const noResults = document.getElementById('no-results');
            const sectionBot = document.getElementById('section-Árabes');
            const sectionBrand = document.getElementById('section-brand');
            
            gridBot.innerHTML = ''; gridBrand.innerHTML = '';
            
            let countBot = 0;
            let countBrand = 0;

            productsToRender.forEach(p => {
                const isEsgotado = p.stock <= 0;
                
                const imageHtml = p.image && p.image !== "" 
                    ? `<img src="${p.image}" alt="${p.name}" class="product-image transform group-hover:scale-105 transition-transform duration-700">`
                    : `<span class="text-gray-400 font-serif tracking-widest text-xs uppercase transform group-hover:scale-110 transition-transform duration-700 p-4 text-center">sem imagem</span>`;

                const card = `
                    <div class="group bg-white rounded-xl shadow-sm hover:shadow-2xl transition-all duration-500 border border-gray-100 overflow-hidden relative flex flex-col">
                        <div class="h-64 bg-gradient-to-br from-gray-50 to-gray-100 flex items-center justify-center overflow-hidden relative border-b border-gray-100">
                            ${imageHtml}
                            ${isEsgotado ? '<div class="absolute top-3 right-3 bg-midnight text-white text-[10px] uppercase tracking-wider px-3 py-1 rounded-full shadow-md z-10">Esgotado</div>' : ''}
                        </div>
                        
                        <div class="p-5 flex flex-col flex-1 bg-white relative z-10">
                            <h4 class="text-base font-serif text-midnight mb-1 group-hover:text-gold transition-colors line-clamp-2 h-12">${p.name}</h4>
                            <p class="text-xl text-gray-800 font-light mb-5">R$ ${parseFloat(p.price).toFixed(2).replace('.', ',')}</p>
                            
                            <div class="mt-auto">
                                ${isEsgotado 
                                    ? '<button disabled class="w-full border border-gray-200 text-gray-400 py-2.5 uppercase tracking-widest text-xs cursor-not-allowed rounded-sm">Indisponível</button>' 
                                    : `<button onclick="window.addToCart('${p.id}')" class="w-full bg-white border border-midnight text-midnight py-2.5 uppercase tracking-widest text-xs hover:bg-midnight hover:text-white transition-all duration-300 rounded-sm">Adicionar à Sacola</button>`}
                            </div>
                        </div>
                    </div>
                `;
                
                if(p.brand === 'Árabes') {
                    gridBot.innerHTML += card;
                    countBot++;
                } else {
                    gridBrand.innerHTML += card;
                    countBrand++;
                }
            });

            sectionBot.classList.toggle('hidden', countBot === 0);
            sectionBrand.classList.toggle('hidden', countBrand === 0);
            noResults.classList.toggle('hidden', productsToRender.length > 0);
        }

        // --- ATUALIZADO: FUNÇÃO DE BUSCA E CONTADOR ---
        window.searchProducts = function() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
            const heroSection = document.getElementById('hero-section');
            const searchCount = document.getElementById('search-count');
            
            // Se o campo de busca ficar vazio, volta o site ao normal
            if (searchTerm === "") {
                heroSection.classList.remove('hidden');
                searchCount.classList.add('hidden');
                window.renderProducts(products);
                return;
            }

            // Se tem texto na busca, filtra os produtos
            const filteredProducts = products.filter(p => 
                p.name.toLowerCase().includes(searchTerm) || 
                p.brand.toLowerCase().includes(searchTerm)
            );
            
            // Esconde o Banner Gigante e mostra a frase de contagem
            heroSection.classList.add('hidden');
            searchCount.classList.remove('hidden');
            
            // Atualiza a frase com a quantidade exata
            if (filteredProducts.length === 0) {
                searchCount.innerHTML = `Nenhum perfume encontrado para "<b>${searchTerm}</b>"`;
            } else if (filteredProducts.length === 1) {
                searchCount.innerHTML = `1 perfume encontrado`;
            } else {
                searchCount.innerHTML = `${filteredProducts.length} perfumes encontrados`;
            }

            window.renderProducts(filteredProducts);
        }

        window.clearSearch = function() {
            document.getElementById('search-input').value = '';
            window.searchProducts();
        }

        window.toggleCart = function() {
            const sidebar = document.getElementById('cart-sidebar');
            const overlay = document.getElementById('cart-overlay');
            
            sidebar.classList.toggle('translate-x-full');
            
            if(sidebar.classList.contains('translate-x-full')) {
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            } else {
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.remove('opacity-0'), 10);
            }
        }

        window.addToCart = function(id) {
            const product = products.find(p => p.id === id);
            if(product && product.stock > 0) {
                const item = cart.find(i => i.id === id);
                if(item) {
                    if(item.qtd < product.stock) item.qtd++;
                    else alert('Estoque máximo atingido para este item.');
                } else {
                    cart.push({...product, qtd: 1});
                    
                    const btn = event.currentTarget;
                    if(btn) {
                        const originalText = btn.innerText;
                        btn.innerText = "Adicionado ✓";
                        btn.classList.replace('bg-white', 'bg-gold');
                        btn.classList.replace('text-midnight', 'text-white');
                        btn.classList.replace('border-midnight', 'border-gold');
                        setTimeout(() => {
                            btn.innerText = originalText;
                            btn.classList.replace('bg-gold', 'bg-white');
                            btn.classList.replace('text-white', 'text-midnight');
                            btn.classList.replace('border-gold', 'border-midnight');
                        }, 1500);
                    }
                }
                window.updateCart();
            }
        }

        window.removeFromCart = function(index) {
            cart.splice(index, 1);
            window.updateCart();
        }

        window.updateCart = function() {
            const container = document.getElementById('cart-items');
            let total = 0;
            let count = 0;

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-gray-400 space-y-4 mt-20">
                        <i class="fas fa-shopping-bag text-5xl opacity-30 mb-4"></i>
                        <p class="font-light text-lg">Sua sacola está vazia.</p>
                    </div>`;
            } else {
                container.innerHTML = '';
                cart.forEach((item, index) => {
                    total += item.price * item.qtd;
                    count += item.qtd;
                    
                    const imgInCart = item.image && item.image !== "" 
                        ? `<img src="${item.image}" alt="${item.name}" class="w-16 h-16 object-contain p-1 border rounded-sm">`
                        : `<div class="w-16 h-16 bg-gray-100 rounded-sm flex items-center justify-center text-[8px] text-gray-400 font-serif uppercase text-center p-1 border">sem<br>imagem</div>`;

                    container.innerHTML += `
                        <div class="flex gap-4 items-center border-b border-gray-100 pb-4">
                            ${imgInCart}
                            <div class="flex-1">
                                <p class="font-serif text-sm text-midnight">${item.name}</p>
                                <p class="text-xs text-gray-500 mt-1">Qtd: ${item.qtd}</p>
                                <p class="text-sm font-semibold text-gold mt-1">R$ ${item.price.toFixed(2).replace('.', ',')}</p>
                            </div>
                            <button onclick="window.removeFromCart(${index})" class="text-gray-300 hover:text-red-500 transition-colors p-2"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                });
            }

            document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
            document.getElementById('cart-count').innerText = count;
        }

        // --- ATUALIZADO: MENSAGEM DO WHATSAPP SEM EMOJIS ---
        window.checkout = function() {
            if(cart.length === 0) return alert('Sua sacola está vazia!');
            
            let text = "Ola! Gostaria de fazer o seguinte pedido na Elegance Perfumes:%0A%0A";
            let total = 0;
            
            cart.forEach(item => {
                text += `- ${item.qtd}x ${item.name} (${item.brand === 'Árabes' ? 'Árabes' : 'Brand'}) | R$ ${(item.price * item.qtd).toFixed(2).replace('.', ',')}%0A`;
                total += item.price * item.qtd;
            });
            
            text += `%0A*Total do Pedido: R$ ${total.toFixed(2).replace('.', ',')}*%0A%0AAguardo o retorno para confirmar e combinar a entrega/pagamento.`;
            
            const numero = "5592994246242"; 
            window.open(`https://wa.me/${numero}?text=${text}`, '_blank');
        }
    </script>
</body>
</html>
